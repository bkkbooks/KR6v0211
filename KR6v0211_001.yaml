body:
  text: 敕賜嵩顯禪寺碑記神不夜者也垂慈暉之上久化於億載之下大千燭茲昏且隱顯弗恒契乎非運資廣因樹應曩世豈能開扇道風施沾法雨者哉仰惟皇帝陛下纂統重光紹隆累聖德洽三才道均五緯政極辰乃源遊神法菀慧鼓既振普天聞般若之音頹綱更開率土悟火宅之場斯趣矣自惟啓蹤冀方樹基勃海并世宛著姓神州靈降盛淂戚聯朝旭昵親夕容內秉望舒之讚外憖阿衡之翼入總謀議出沖波坤津潛液寒族貫春日之榮幽附沾夏辰之蔚輝顯哉而渥而溳心罔謝遂仰慕皇緯報施之功亦尋聖經緣果之旨詳群蘭厥靈岑擇茲飃嶺上涌沖天之峰下帶岫之險重基雲構飛級槃屈虯電暐豔琨成瑍若資神乃質沉堅翠外麗炎新至之在希世之相千像吐琦万形挺妙苕苕焉暉赫萃乎兆日修修焉感發斯誠冀微功鍾於至德顯福應於道祚述遵休風遂興頌曰修哉渾源冥化琨成道氣既開像垂形紛華競耀至猷淹經聖覺匪恢恢至謨苕苕遐宣道流三界化溢大千幽衢啓轍靜境亟埏隱顯弗恒聖皇沖感靈液遐融潤均法海扇協道風悟因訓萃果隨業崇區萇靈降盛德二后經綸內光椒掖外允九臣齊思渭陽嘉爵交臻誓被沉谿賁壑峰山霄星風雲交液吐化蚕類玄堂暐豔聖容啟靈樹銘興大魏永平二年歲在己丑四月戊申朔八日乙卯使持節都督涇
